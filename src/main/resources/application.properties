
--------------------------------------------
# MySQL Database Configuration
spring.application.name=PrePrj311
spring.datasource.url=jdbc:mysql://localhost:3306/dbtest?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&useLegacyDatetimeCode=false&characterEncoding=UTF-8
#  ?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.show-sql=true 
spring.jpa.properties.hibernate.format_sql=true  
spring.jpa.properties.hibernate.highlight_sql=true
# Thymeleaf Configuration
spring.thymeleaf.cache=false 
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML

# Logging Configuration
logging.level.org.springframework=INFO 
logging.level.org.hibernate.SQL=DEBUG 
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE  

logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.orm.jpa=DEBUG
# Server Configuration
server.port=8080
#my spring conf
spring.main.allow-bean-definition-overriding=true
spring.mvc.hiddenmethod.filter.enabled=true

logging.level.org.hibernate=debug
